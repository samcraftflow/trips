/* ─── BOOKING TRACKER ─── */
const bookings = lsGet('bookings', {});
function bookingKey(stopIdx, taskIdx) { return `${stopIdx}-${taskIdx}`; }
function isBooked(stopIdx, taskIdx) { return !!bookings[bookingKey(stopIdx, taskIdx)]; }
function setBooked(stopIdx, taskIdx, v) { bookings[bookingKey(stopIdx, taskIdx)] = v; lsSet('bookings', bookings); }

function countBookings() {
  let total = 0, done = 0, urgentLeft = 0;
  TRIP.stops.forEach((stop, i) => {
    (stop.checklist || []).forEach((t, j) => {
      total++;
      if (isBooked(i, j)) done++;
      else if (t.urgent) urgentLeft++;
    });
  });
  return { total, done, urgentLeft, pct: total === 0 ? 0 : Math.round(done / total * 100) };
}
function renderBookingCard() {
  const c = countBookings();
  const circ = 2 * Math.PI * 18; // r=18
  const offset = circ * (1 - c.pct / 100);
  $('#bookingCard').innerHTML = `
    <div class="booking-circle">
      <svg viewBox="0 0 44 44">
        <circle class="booking-track" cx="22" cy="22" r="18" />
        <circle class="booking-fill" cx="22" cy="22" r="18" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
      </svg>
      <div class="booking-pct">${c.pct}%</div>
    </div>
    <div class="booking-body">
      <div class="booking-title">Booking Progress</div>
      <div class="booking-detail">
        ${c.done} of ${c.total} booked
        ${c.urgentLeft > 0 ? `<span class="urgent">· ${c.urgentLeft} urgent left</span>` : ''}
      </div>
    </div>
  `;
}
function unbookedUrgent(stopIdx) {
  return (TRIP.stops[stopIdx].checklist || []).filter((t, j) => t.urgent && !isBooked(stopIdx, j)).length;
}

/* ─── PACKING LIST ─── */
const packed = lsGet('packed', {});
const customPacking = lsGet('customPacking', {}); // {categoryIdx: ["item1", "item2"]}

function packingKey(catIdx, itemIdx, custom) { return `${custom ? 'c' : 'd'}-${catIdx}-${itemIdx}`; }
function isPacked(key) { return !!packed[key]; }
function setPacked(key, v) { packed[key] = v; lsSet('packed', packed); }

function getPackingCategories() {
  const base = TRIP.packingList || [];
  return base.map((cat, catIdx) => ({
    category: cat.category,
    catIdx,
    defaults: cat.items || [],
    custom: customPacking[catIdx] || [],
  }));
}

function countPacking() {
  let total = 0, done = 0;
  getPackingCategories().forEach(cat => {
    cat.defaults.forEach((_, i) => { total++; if (isPacked(packingKey(cat.catIdx, i, false))) done++; });
    cat.custom.forEach((_, i) => { total++; if (isPacked(packingKey(cat.catIdx, i, true))) done++; });
  });
  return { total, done, left: total - done, pct: total === 0 ? 0 : Math.round(done / total * 100) };
}

function renderPackingCard() {
  if (!TRIP.packingList || TRIP.packingList.length === 0) { $('#packingCard').style.display = 'none'; return; }
  const c = countPacking();
  const circ = 2 * Math.PI * 18;
  const offset = circ * (1 - c.pct / 100);
  const card = $('#packingCard');
  const wasOpen = card.classList.contains('is-open');
  card.innerHTML = `
    <button class="packing-head" onclick="togglePacking()" aria-expanded="${wasOpen}" aria-controls="packingExpanded">
      <div class="packing-circle">
        <svg viewBox="0 0 44 44" aria-hidden="true">
          <circle class="packing-track" cx="22" cy="22" r="18" />
          <circle class="packing-fill" cx="22" cy="22" r="18" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
        </svg>
        <div class="packing-pct">${c.pct}%</div>
      </div>
      <div class="packing-body">
        <div class="packing-title-row">
          <span class="packing-title">Packing List</span>
          <span class="packing-chevron" aria-hidden="true"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 7,9 11,5"/></svg></span>
        </div>
        <div class="packing-detail">
          ${c.done} of ${c.total} packed
          ${c.left > 0 ? `· <span class="left">${c.left} left</span>` : ''}
        </div>
      </div>
    </button>
    <div class="packing-body-expanded" id="packingExpanded">${renderPackingExpanded()}</div>
  `;
  if (wasOpen) card.classList.add('is-open');
}

function renderPackingExpanded() {
  return getPackingCategories().map(cat => {
    const defaultItems = cat.defaults.map((item, i) => {
      const k = packingKey(cat.catIdx, i, false);
      const checked = isPacked(k);
      return `<li class="packing-item ${checked ? 'is-checked' : ''}">
        <span class="packing-checkbox ${checked ? 'is-checked' : ''}" role="checkbox" tabindex="0" aria-checked="${checked}" aria-labelledby="pk-lbl-${k}" onclick="togglePack('${k}',this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();togglePack('${k}',this);}"></span>
        <span class="packing-label" id="pk-lbl-${k}" onclick="togglePack('${k}',this.previousElementSibling)">${escapeHtml(item)}</span>
      </li>`;
    }).join('');
    const customItems = cat.custom.map((item, i) => {
      const k = packingKey(cat.catIdx, i, true);
      const checked = isPacked(k);
      return `<li class="packing-item is-custom ${checked ? 'is-checked' : ''}">
        <span class="packing-checkbox ${checked ? 'is-checked' : ''}" role="checkbox" tabindex="0" aria-checked="${checked}" aria-labelledby="pk-lbl-${k}" onclick="togglePack('${k}',this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();togglePack('${k}',this);}"></span>
        <span class="packing-label" id="pk-lbl-${k}" onclick="togglePack('${k}',this.previousElementSibling)">${escapeHtml(item)}</span>
        <button class="packing-remove" onclick="removeCustomPackingItem(${cat.catIdx}, ${i})" title="Remove" aria-label="Remove ${escapeHtml(item)}"><span aria-hidden="true">×</span></button>
      </li>`;
    }).join('');
    return `<div class="packing-category">
      <div class="packing-category-title">${escapeHtml(cat.category)}</div>
      <ul class="packing-items">${defaultItems}${customItems}</ul>
      <div class="packing-add-row">
        <input class="packing-add-input" type="text" placeholder="Add item..." aria-label="Add custom item to ${escapeHtml(cat.category)}" onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomPackingItem(${cat.catIdx},this);}" />
        <button class="packing-add-btn" onclick="addCustomPackingItem(${cat.catIdx}, this.previousElementSibling)" aria-label="Add"><span aria-hidden="true">+</span></button>
      </div>
    </div>`;
  }).join('');
}

window.togglePacking = function() {
  const card = $('#packingCard');
  card.classList.toggle('is-open');
  const btn = card.querySelector('.packing-head');
  if (btn) btn.setAttribute('aria-expanded', card.classList.contains('is-open'));
};
window.togglePack = function(key, checkboxEl) {
  const newVal = !isPacked(key);
  setPacked(key, newVal);
  checkboxEl.classList.toggle('is-checked', newVal);
  checkboxEl.setAttribute('aria-checked', newVal);
  checkboxEl.closest('.packing-item').classList.toggle('is-checked', newVal);
  // Update the ring + counter without re-rendering the whole list
  const c = countPacking();
  const circ = 2 * Math.PI * 18;
  const offset = circ * (1 - c.pct / 100);
  const fill = $('#packingCard .packing-fill');
  const pct = $('#packingCard .packing-pct');
  const detail = $('#packingCard .packing-detail');
  if (fill) fill.setAttribute('stroke-dashoffset', offset);
  if (pct) pct.textContent = `${c.pct}%`;
  if (detail) detail.innerHTML = `${c.done} of ${c.total} packed${c.left > 0 ? ` · <span class="left">${c.left} left</span>` : ''}`;
};
window.addCustomPackingItem = function(catIdx, inputEl) {
  const text = inputEl.value.trim();
  if (!text) return;
  if (!customPacking[catIdx]) customPacking[catIdx] = [];
  customPacking[catIdx].push(text);
  lsSet('customPacking', customPacking);
  inputEl.value = '';
  renderPackingCard();
  $('#packingCard').classList.add('is-open');
};
window.removeCustomPackingItem = function(catIdx, customIdx) {
  if (!customPacking[catIdx]) return;
  // Also delete its packed state
  const oldKey = packingKey(catIdx, customIdx, true);
  delete packed[oldKey];
  // Shift packed state for subsequent custom items in same category
  const list = customPacking[catIdx];
  for (let i = customIdx + 1; i < list.length; i++) {
    const oldK = packingKey(catIdx, i, true);
    const newK = packingKey(catIdx, i - 1, true);
    if (packed[oldK]) { packed[newK] = true; delete packed[oldK]; }
  }
  list.splice(customIdx, 1);
  lsSet('customPacking', customPacking);
  lsSet('packed', packed);
  renderPackingCard();
  $('#packingCard').classList.add('is-open');
};

/* ─── STOPS LIST ─── */
function renderStopsList() {
  const list = $('#stopsList');
  list.innerHTML = '';
  TRIP.stops.forEach((stop, i) => {
    const warnCount = unbookedUrgent(i);
    const card = el('li', {
      class: 'stop-card', 'data-stop-index': i,
      tabindex: '0', role: 'button',
      'aria-label': `Open details for stop ${stop.n}: ${stop.name}`,
      onClick: () => selectStop(i),
      onKeydown: (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectStop(i); } }
    },
      el('div', { class: 'stop-num', style: `background: ${stop.color}` }, String(stop.n)),
      el('div', { class: 'stop-body' },
        el('div', { class: 'stop-header' },
          el('span', { class: 'stop-emoji' }, stop.emoji || ''),
          el('span', { class: 'stop-name' }, stop.name)
        ),
        el('div', { class: 'stop-meta' },
          el('span', {}, stop.day || ''),
          stop.dates ? el('span', { class: 'stop-meta-sep' }) : null,
          el('span', {}, stop.dates || '')
        ),
        stop.badge ? el('span', { class: 'stop-badge' }, stop.badge) : null
      ),
      warnCount > 0 ? el('span', { class: 'stop-card-warn is-shown' }, `${warnCount} to book`) : null
    );
    list.appendChild(card);
  });
}
function refreshStopWarnings() {
  $$('.stop-card').forEach((card, i) => {
    const warn = unbookedUrgent(i);
    let warnEl = card.querySelector('.stop-card-warn');
    if (warn > 0) {
      if (!warnEl) { warnEl = el('span', { class: 'stop-card-warn is-shown' }); card.appendChild(warnEl); }
      warnEl.textContent = `${warn} to book`;
      warnEl.title = `${warn} urgent item${warn === 1 ? '' : 's'} not yet booked`;
      warnEl.classList.add('is-shown');
    } else if (warnEl) {
      warnEl.classList.remove('is-shown');
    }
  });
}

/* ─── MAP ─── */
let map, stopMarkers = [], poiMarkers = [], routeLine, currentStopIdx = -1;
const MAP_STYLES = {
  editorial: {
    light: { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr: '&copy; OSM &copy; CARTO', sub: 'abcd' },
    dark:  { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  attr: '&copy; OSM &copy; CARTO', sub: 'abcd' }
  },
  vintage: {
    light: { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attr: '&copy; OSM &copy; CARTO', sub: 'abcd', maxNativeZoom: 20 },
    dark:  { url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', attr: '&copy; OSM &copy; CARTO', sub: 'abcd', maxNativeZoom: 20 }
  },
  satellite: {
    light: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr: 'Tiles &copy; Esri', sub: 'abc' },
    dark:  { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr: 'Tiles &copy; Esri', sub: 'abc' }
  }
};
function applyMapStyle(name) {
  if (!map) return;
  // Guard: fall back to editorial if name is unknown (e.g. removed style still in localStorage)
  if (!MAP_STYLES[name]) name = 'editorial';
  window._currentMapStyle = name;
  lsSet('mapstyle', name);
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const cfg = MAP_STYLES[name][t];
  if (window._mapTiles) map.removeLayer(window._mapTiles);
  window._mapTiles = L.tileLayer(cfg.url, { attribution: cfg.attr, subdomains: cfg.sub, maxZoom: 19, maxNativeZoom: cfg.maxNativeZoom || 19 }).addTo(map);
  $$('.style-btn').forEach(b => b.classList.toggle('is-active', b.dataset.style === name));
}
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: true, zoomSnap: 0.5 });
  applyMapStyle(lsGet('mapstyle') || 'editorial');
  TRIP.stops.forEach((stop, i) => {
    const icon = L.divIcon({
      className: 'stop-marker',
      html: `<div class="stop-marker-inner" style="background: ${stop.color}">${stop.n}</div>`,
      iconSize: [40, 40], iconAnchor: [20, 20]
    });
    const m = L.marker(stop.coords, { icon, riseOnHover: true }).addTo(map);
    m.on('click', () => selectStop(i));
    stopMarkers.push(m);
  });

  // Zoom out gently on popup close — stay close enough to see neighboring POIs,
  // not all the way back to "fit all stop POIs" (which can be too far on big stops like Sorrento + Capri).
  map.on('popupclose', () => {
    if (currentStopIdx < 0) return;
    const currentZoom = map.getZoom();
    // Step back 1.5 zoom levels. Floor at 13 (still see most neighbors in a city/area).
    const targetZoom = Math.max(13, currentZoom - 1.5);
    map.flyTo(map.getCenter(), targetZoom, { duration: 0.5, easeLinearity: 0.4 });
  });
  routeLine = L.polyline(TRIP.stops.map(s => s.coords), {
    color: '#8b8479', weight: 2.5, opacity: 0.7, dashArray: '6, 8', lineCap: 'round', lineJoin: 'round'
  }).addTo(map);
  fitAllStops();
  renderLegend();
  $('#mapReset').addEventListener('click', () => {
    currentStopIdx = -1;
    fitAllStops();
    clearPois();
    closeDetail();
    updateActiveMarker(-1);
    $('#mapReset').classList.remove('is-visible');
  });
  $$('.style-btn').forEach(b => b.addEventListener('click', () => applyMapStyle(b.dataset.style)));
}
function renderLegend() {
  $('#mapLegend').innerHTML = TRIP.countries.map(c =>
    `<div class="legend-row"><span class="legend-dot" style="background:${c.color}"></span>${c.flag} ${c.name}</div>`
  ).join('');
}
function fitAllStops() {
  if (!TRIP.stops.length) return;
  map.fitBounds(L.latLngBounds(TRIP.stops.map(s => s.coords)), { padding: [60, 60], maxZoom: 7 });
}
function updateActiveMarker(idx) {
  stopMarkers.forEach((m, i) => {
    const e = m._icon;
    if (e) e.classList.toggle('is-active', i === idx);
  });
  $$('.stop-card').forEach((c, i) => c.classList.toggle('is-active', i === idx));
}
function clearPois() { poiMarkers.forEach(m => map.removeLayer(m)); poiMarkers = []; }

function buildPoiPopupHtml(item, stop, isHotel, itemKey) {
  const tags = isHotel ? tagFromTier(item.tag) : (item.tags || []);
  const tagsHtml = tags.map(t => `<span class="poi-popup-tag">${escapeHtml(t)}</span>`).join('');
  const price = isHotel ? item.price : item.budget;
  const meta = [
    price ? `<span class="poi-popup-tag">💰 ${escapeHtml(price)}</span>` : '',
    item.time ? `<span class="poi-popup-tag">⏱ ${escapeHtml(item.time)}</span>` : '',
    tagsHtml,
  ].filter(Boolean).join('');
  const actions = [
    `<a class="action-btn" href="${mapsUrl(item.name, stop, item.coords)}" target="_blank" rel="noopener"><span class="action-btn-icon">📍</span>Maps</a>`,
    isHotel
      ? `<a class="action-btn" href="${bookingUrl(item.name, stop)}" target="_blank" rel="noopener"><span class="action-btn-icon">🏨</span>Booking</a>
         <a class="action-btn" href="${compareHotelsUrl(item.name, stop)}" target="_blank" rel="noopener"><span class="action-btn-icon">💰</span>Compare</a>`
      : `<a class="action-btn" href="${getYourGuideUrl(item.name, stop)}" target="_blank" rel="noopener"><span class="action-btn-icon">🎫</span>Tours</a>
         <a class="action-btn" href="${tripadvisorUrl(item.name, stop)}" target="_blank" rel="noopener"><span class="action-btn-icon">ℹ️</span>Reviews</a>`,
    `<button class="action-btn" onclick="openPoiInPanel(${currentStopIdx}, '${itemKey}')"><span class="action-btn-icon">→</span>Details</button>`,
  ].join('');
  // Initial photo pool: stop's pre-fetched 4 photos (always available, no async needed)
  const stopPhotos = (stop.photos || []).filter(p => p);
  const initialPhotos = stopPhotos.length ? stopPhotos.slice(0, 5) : [null];
  const wikiTitle = isHotel ? '' : item.name;
  const fallbackPoolJson = escapeHtml(JSON.stringify(stopPhotos));
  const slides = initialPhotos.map((p, i) =>
    `<div class="poi-popup-slide">${p ? `<img alt="" src="${escapeHtml(p)}" onerror="handleSlideImgError(this)" />` : ''}</div>`
  ).join('');
  const dots = initialPhotos.map((_, i) =>
    `<button class="poi-popup-carousel-dot ${i === 0 ? 'is-active' : ''}" data-idx="${i}" aria-label="Photo ${i + 1}"></button>`
  ).join('');
  const carousel = `
    <div class="poi-popup-carousel" style="--popup-color: ${stop.color}" data-wiki-title="${escapeHtml(wikiTitle)}" data-country="${escapeHtml(stopCountryEn(stop))}" data-fallback-pool="${fallbackPoolJson}">
      <div class="poi-popup-carousel-track">${slides}</div>
      ${initialPhotos.length > 1 ? `<button class="poi-popup-carousel-nav prev" aria-label="Previous photo"><span aria-hidden="true">‹</span></button>
      <button class="poi-popup-carousel-nav next" aria-label="Next photo"><span aria-hidden="true">›</span></button>
      <div class="poi-popup-carousel-dots">${dots}</div>` : ''}
      <div class="poi-popup-carousel-credit" aria-hidden="true">📷 Wikipedia</div>
    </div>`;
  return `${carousel}
    <div class="poi-popup-body">
      <div class="poi-popup-head">
        <span class="poi-popup-emoji">${item.emoji || (isHotel ? '🏨' : '📍')}</span>
        <span class="poi-popup-name">${escapeHtml(item.name)}</span>
      </div>
      ${item.desc ? `<p class="poi-popup-desc">${escapeHtml(item.desc)}</p>` : ''}
      ${meta ? `<div class="poi-popup-meta">${meta}</div>` : ''}
      <div class="poi-popup-actions">${actions}</div>
    </div>`;
}

// Image fallback: if a carousel image 404s, swap to next stop photo in pool; if all fail, remove the slide
window.handleSlideImgError = function(img) {
  const carousel = img.closest('.poi-popup-carousel');
  if (!carousel) return;
  let pool = [];
  try { pool = JSON.parse(carousel.dataset.fallbackPool || '[]'); } catch (e) {}
  const tried = new Set((img.dataset.tried || '').split('||').filter(Boolean));
  tried.add(img.src);
  img.dataset.tried = Array.from(tried).join('||');
  const next = pool.find(p => !tried.has(p) && !tried.has(new URL(p, window.location.href).href));
  if (next) {
    img.src = next;
  } else {
    // No more fallbacks — remove this slide and its dot
    const slide = img.closest('.poi-popup-slide');
    if (!slide) return;
    const slideIdx = Array.from(slide.parentElement.children).indexOf(slide);
    slide.remove();
    const dots = carousel.querySelectorAll('.poi-popup-carousel-dot');
    if (dots[slideIdx]) dots[slideIdx].remove();
    // Re-wire dots since indices changed
    delete carousel.dataset.wired;
    setupPoiCarousel();
  }
};

function setupPoiCarousel() {
  const c = document.querySelector('.leaflet-popup .poi-popup-carousel');
  if (!c || c.dataset.wired === '1') return;
  c.dataset.wired = '1';
  const track = c.querySelector('.poi-popup-carousel-track');
  const dots = Array.from(c.querySelectorAll('.poi-popup-carousel-dot'));
  const prev = c.querySelector('.prev');
  const next = c.querySelector('.next');
  const updateState = () => {
    const idx = Math.round(track.scrollLeft / track.clientWidth);
    dots.forEach((d, i) => d.classList.toggle('is-active', i === idx));
    if (prev) prev.disabled = idx <= 0;
    if (next) next.disabled = idx >= dots.length - 1;
  };
  track.addEventListener('scroll', updateState, { passive: true });
  if (prev) prev.addEventListener('click', () => track.scrollBy({ left: -track.clientWidth, behavior: 'smooth' }));
  if (next) next.addEventListener('click', () => track.scrollBy({ left: track.clientWidth, behavior: 'smooth' }));
  dots.forEach((d, i) => d.addEventListener('click', () => track.scrollTo({ left: i * track.clientWidth, behavior: 'smooth' })));
  updateState();
}

async function maybeLoadWikiInPopup() {
  const c = document.querySelector('.leaflet-popup .poi-popup-carousel');
  if (!c) return;
  setupPoiCarousel();
  if (c.dataset.wikiLoaded === '1') return;
  c.dataset.wikiLoaded = '1';
  const wikiTitle = c.dataset.wikiTitle;
  if (!wikiTitle) return; // hotels — keep stop photos as-is

  const country = c.dataset.country || '';
  // Try multiple title variants — Wikipedia article titles rarely match composite POI names
  const cleanBase = wikiTitle.replace(/\(.*\)/g, '').trim();
  const parts = cleanBase.split(/\s*[·\+&]\s*/).map(p => p.trim()).filter(Boolean);
  const candidates = [...new Set([
    wikiTitle,
    cleanBase,
    ...parts,
    `${parts[0] || cleanBase} ${country}`.trim(),
    `${cleanBase} ${country}`.trim(),
  ].filter(Boolean))];
  let wikiUrls = [];
  for (const t of candidates) {
    wikiUrls = await fetchWikiMediaList(t);
    if (wikiUrls.length >= 2) break;
  }
  if (wikiUrls.length === 0) return;

  // Swap in wiki photos for first slides (prepend, smooth fade)
  const slides = Array.from(c.querySelectorAll('.poi-popup-slide'));
  const toShow = wikiUrls.slice(0, 5);
  // Build new slide HTML: wiki photos first, then any remaining stop photos to fill
  const track = c.querySelector('.poi-popup-carousel-track');
  const existingStopPhotos = slides.map(s => s.querySelector('img')?.getAttribute('src')).filter(Boolean);
  const allPhotos = [...toShow];
  for (const sp of existingStopPhotos) { if (allPhotos.length >= 5) break; if (!allPhotos.includes(sp)) allPhotos.push(sp); }

  // Re-render slides + dots — onerror swaps to stop fallback pool
  track.innerHTML = allPhotos.map(p => `<div class="poi-popup-slide"><img alt="" src="${escapeHtml(p)}" onerror="handleSlideImgError(this)" /></div>`).join('');
  const dotsEl = c.querySelector('.poi-popup-carousel-dots');
  if (dotsEl) {
    dotsEl.innerHTML = allPhotos.map((_, i) => `<button class="poi-popup-carousel-dot ${i === 0 ? 'is-active' : ''}" data-idx="${i}" aria-label="Photo ${i + 1}"></button>`).join('');
  }
  c.classList.add('has-wiki');
  c.dataset.wired = ''; // re-wire dots/nav after re-render
  setupPoiCarousel();
}

function bindPoiClick(marker, item, stop, isHotel, itemKey) {
  marker.on('click', () => {
    // Zoom into the POI so user doesn't need to manually scroll/zoom
    const targetZoom = isHotel ? 16 : 15; // hotels need tighter zoom (specific building)
    const currentZoom = map.getZoom();
    const flyZoom = Math.max(currentZoom, targetZoom);
    map.flyTo(item.coords, flyZoom, { duration: 0.7, easeLinearity: 0.4 });
    // Open popup after map starts moving (autoPan handles keeping it visible)
    setTimeout(() => {
      const html = buildPoiPopupHtml(item, stop, isHotel, itemKey);
      L.popup({ maxWidth: 280, minWidth: 280, autoPan: true, autoPanPadding: [40, 40], offset: [0, -12] })
        .setLatLng(item.coords)
        .setContent(html)
        .openOn(map);
      setTimeout(maybeLoadWikiInPopup, 80);
    }, 250);
  });
}

function showStopPois(stop) {
  clearPois();
  (stop.activities || []).forEach((a, idx) => {
    if (!a.coords || a.coords.length !== 2) return;
    const m = L.marker(a.coords, {
      icon: L.divIcon({ className: 'poi-marker', html: `<div class="poi-marker-inner" style="color:${stop.color}">${a.emoji || '📍'}</div>`, iconSize: [28, 28], iconAnchor: [14, 14] }),
      riseOnHover: true
    }).addTo(map);
    bindPoiClick(m, a, stop, false, `a-${idx}`);
    poiMarkers.push(m);
  });
  (stop.hotels || []).forEach((h, idx) => {
    if (!h.coords || h.coords.length !== 2) return;
    const m = L.marker(h.coords, {
      icon: L.divIcon({ className: 'poi-marker is-hotel', html: `<div class="poi-marker-inner" style="color:${stop.color}">${h.emoji || '🏨'}</div>`, iconSize: [28, 28], iconAnchor: [14, 14] }),
      riseOnHover: true
    }).addTo(map);
    bindPoiClick(m, h, stop, true, `h-${idx}`);
    poiMarkers.push(m);
  });
}

/* ─── PLAY JOURNEY ─── */
let isPlaying = false;
let activeVehicleMarker = null;
async function playJourney() {
  if (isPlaying) { stopJourney(); return; }
  isPlaying = true;
  $('#playBtn').textContent = '■';
  $('#playBtn').classList.add('is-playing');
  closeDetail();
  $('#journeyProgress').classList.add('is-visible');
  for (let i = 0; i < TRIP.stops.length; i++) {
    if (!isPlaying) break;
    const stop = TRIP.stops[i];
    $('#journeyLabel').textContent = `${stop.n}. ${stop.name}`;
    $('#journeyFill').style.width = `${(i + 1) / TRIP.stops.length * 100}%`;
    map.flyTo(stop.coords, 7, { duration: 1.2 });
    updateActiveMarker(i);
    await sleep(1500);
    if (!isPlaying) break;
    if (i < TRIP.stops.length - 1) {
      const next = TRIP.stops[i + 1];
      const icon = (stop.transportOut?.icon || '🚗').match(/[\p{Emoji}]/u)?.[0] || '🚗';
      $('#journeyLabel').textContent = `${stop.name} → ${next.name}`;
      await animateVehicle(stop.coords, next.coords, icon);
    }
  }
  stopJourney();
}
async function animateVehicle(from, to, icon) {
  activeVehicleMarker = L.marker(from, {
    icon: L.divIcon({ className: 'vehicle-marker', html: `<div class="vehicle-icon">${icon}</div>`, iconSize: [40, 40], iconAnchor: [20, 20] })
  }).addTo(map);
  const steps = 40;
  const bounds = L.latLngBounds([from, to]).pad(0.3);
  map.fitBounds(bounds, { padding: [60, 60], maxZoom: 8, animate: true, duration: 0.6 });
  await sleep(600);
  for (let i = 0; i <= steps; i++) {
    if (!isPlaying) break;
    const t = i / steps;
    const lat = from[0] + (to[0] - from[0]) * t;
    const lng = from[1] + (to[1] - from[1]) * t;
    activeVehicleMarker.setLatLng([lat, lng]);
    await sleep(40);
  }
  if (activeVehicleMarker) { map.removeLayer(activeVehicleMarker); activeVehicleMarker = null; }
}
function stopJourney() {
  isPlaying = false;
  $('#playBtn').textContent = '▶';
  $('#playBtn').classList.remove('is-playing');
  $('#journeyProgress').classList.remove('is-visible');
  if (activeVehicleMarker) { map.removeLayer(activeVehicleMarker); activeVehicleMarker = null; }
}

/* ─── DETAIL PANEL ─── */
function selectStop(idx) {
  const stop = TRIP.stops[idx];
  if (!stop) return;
  // Close any open POI popup from a previous selection — otherwise it lingers
  if (map) map.closePopup();
  currentStopIdx = idx;
  // First-visit hint: user discovered how to open stops, dismiss it
  if (typeof dismissHint === 'function') dismissHint();
  const all = [stop.coords,
    ...(stop.activities || []).filter(a => a.coords).map(a => a.coords),
    ...(stop.hotels || []).filter(h => h.coords).map(h => h.coords)];
  if (all.length > 1) map.fitBounds(L.latLngBounds(all), { padding: [80, 80], maxZoom: 13 });
  else map.flyTo(stop.coords, 12, { duration: 0.8 });
  showStopPois(stop);
  updateActiveMarker(idx);
  $('#mapReset').classList.add('is-visible');

  // Photo grid
  $$('#photoGrid .photo-slot').forEach((slot, i) => {
    const img = slot.querySelector('img');
    slot.style.setProperty('--photo-color', stop.color);
    slot.classList.remove('is-loaded', 'is-fallback');
    img.classList.remove('is-loaded');
    img.removeAttribute('src');
    const url = stop.photos?.[i];
    if (url) {
      img.onload = () => { slot.classList.add('is-loaded'); img.classList.add('is-loaded'); };
      img.onerror = () => { slot.classList.add('is-fallback', 'is-loaded'); };
      img.src = url;
    } else slot.classList.add('is-fallback', 'is-loaded');
  });

  $('#detailHeadNum').textContent = stop.n;
  $('#detailHeadNum').style.background = stop.color;
  $('#detailHeadBadge').textContent = `${stop.country} · ${stop.badge || stop.day}`;
  $('#detailHeadTitle').textContent = `${stop.emoji || ''} ${stop.name}`.trim();
  $('#detailHeadDates').textContent = `${stop.day} · ${stop.dates}`;
  $('#prevStopBtn').disabled = idx === 0;
  $('#nextStopBtn').disabled = idx === TRIP.stops.length - 1;

  ['schedule', 'activities', 'hotels', 'checklist', 'transport'].forEach(name => renderTab(name, stop, idx));
  switchTab('schedule');
  renderNotes(stop, idx);
  renderGoodToKnow(stop);
  openDetail();
}
function openDetail() {
  const p = $('#detailPanel');
  p.classList.add('is-open');
  p.removeAttribute('inert');
}
function closeDetail() {
  const p = $('#detailPanel');
  p.classList.remove('is-open');
  // Return focus to active stop card before disabling
  const activeCard = document.querySelector('.stop-card.is-active');
  if (activeCard) activeCard.focus();
  p.setAttribute('inert', '');
  currentStopIdx = -1; // set BEFORE closePopup so popupclose handler skips its own zoom-out
  if (map) map.closePopup(); // close any open POI floating modal
  updateActiveMarker(-1);
  clearPois();
  $('#mapReset').classList.remove('is-visible');
  fitAllStops();
}

function renderTab(name, stop, stopIdx) {
  let html = '', summary = '';

  if (name === 'schedule') {
    const items = stop.schedule || [];
    html = items.length === 0 ? emptyState('📅', 'No schedule yet')
      : `<ul class="schedule-list">${items.map(s =>
          `<li class="schedule-item"><span class="schedule-bullet"></span><span>${escapeHtml(s)}</span></li>`).join('')}</ul>`;
  }
  if (name === 'activities') {
    const items = stop.activities || [];
    html = items.length === 0 ? emptyState('🎯', 'No activities yet')
      : items.map((a, idx) => itemCard({ emoji: a.emoji, title: a.name, price: a.budget, time: a.time, desc: a.desc, tags: a.tags, coords: a.coords, stop, isHotel: false }).replace('<div class="item-card"', `<div class="item-card" data-item-key="a-${idx}"`)).join('');
    const total = items.reduce((s, a) => s + (parsePrice(a.budget) || 0), 0) * (TRIP.travelers || 1);
    if (total > 0) summary = sectionSummary(`Activities total (${TRIP.travelers} pax)`, `${TRIP.currency} ${fmt(Math.round(total))}`);
  }
  if (name === 'hotels') {
    const items = stop.hotels || [];
    html = items.length === 0 ? emptyState('🏨', 'No hotels picked yet')
      : items.map((h, idx) => itemCard({ emoji: h.emoji, title: h.name, price: h.price, desc: h.desc, tags: tagFromTier(h.tag), coords: h.coords, stop, isHotel: true }).replace('<div class="item-card"', `<div class="item-card" data-item-key="h-${idx}"`)).join('');
    const prices = items.map(h => parsePrice(h.price)).filter(p => p);
    if (prices.length) {
      prices.sort((x, y) => x - y);
      const mid = prices[Math.floor(prices.length / 2)];
      const nights = nightsForStop(stop);
      summary = sectionSummary(`Hotels (median × ${nights} nights)`, `${TRIP.currency} ${fmt(Math.round(mid * nights))}`);
    }
  }
  if (name === 'checklist') {
    const items = stop.checklist || [];
    html = items.length === 0 ? emptyState('✓', 'No tasks')
      : `<ul class="checklist-list">${items.map((c, j) => {
          const booked = isBooked(stopIdx, j);
          const taskId = `task-${stopIdx}-${j}`;
          return `<li class="checklist-item ${c.urgent ? 'is-urgent' : ''} ${booked ? 'is-done' : ''}">
            <span class="checklist-checkbox ${c.urgent ? 'is-urgent' : ''} ${booked ? 'is-checked' : ''}" onclick="toggleBooking(${stopIdx}, ${j}, this)" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleBooking(${stopIdx},${j},this);}" role="checkbox" tabindex="0" aria-checked="${booked}" aria-labelledby="${taskId}"></span>
            <div class="checklist-body">
              <div class="checklist-task" id="${taskId}">${escapeHtml(c.task)}</div>
              ${c.note ? `<div class="checklist-note">${escapeHtml(c.note)}</div>` : ''}
            </div>
            <button class="checklist-cal" onclick="exportIcs(${stopIdx}, ${j})" title="Add to calendar" aria-label="Download calendar reminder for ${escapeHtml(c.task)}"><span aria-hidden="true">📅</span></button>
          </li>`;
        }).join('')}</ul>`;
  }
  if (name === 'transport') {
    const sections = [];
    if (stop.transportIn) sections.push(transportCard(stop.transportIn, 'Arrive'));
    if (stop.transportOut) sections.push(transportCard(stop.transportOut, 'Depart'));
    html = sections.length ? sections.join('') : emptyState('🚄', 'No transport info');
  }
  let pane = $(`.tab-pane[data-pane="${name}"]`);
  if (!pane) { pane = el('div', { class: 'tab-pane', 'data-pane': name }); $('#detailBody').appendChild(pane); }
  pane.innerHTML = html + summary;
}

window.toggleBooking = function(stopIdx, taskIdx, el) {
  const newVal = !isBooked(stopIdx, taskIdx);
  setBooked(stopIdx, taskIdx, newVal);
  el.classList.toggle('is-checked', newVal);
  el.parentElement.classList.toggle('is-done', newVal);
  el.setAttribute('aria-checked', newVal);
  renderBookingCard();
  refreshStopWarnings();
};

window.exportIcs = function(stopIdx, taskIdx) {
  const stop = TRIP.stops[stopIdx];
  const task = stop.checklist[taskIdx];
  const target = new Date(TRIP.countdownTarget);
  const daysAhead = task.urgent ? 60 : 14;
  const dt = new Date(target.getTime() - daysAhead * 24 * 60 * 60 * 1000);
  const dtStr = dt.toISOString().split('T')[0].replace(/-/g, '');
  const uid = `${dtStr}-${stopIdx}-${taskIdx}@samcraftflow-trips`;
  const summary = `${TRIP.title}: ${task.task} (${stop.name})`;
  const desc = (task.note || '') + `\\n\\nFor: ${stop.name} (${stop.dates})`;
  const ics = [
    'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//trips//EN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTAMP:${dtStr}T090000Z`,
    `DTSTART;VALUE=DATE:${dtStr}`,
    `SUMMARY:${summary.replace(/,/g, '\\,')}`,
    `DESCRIPTION:${desc.replace(/,/g, '\\,')}`,
    'BEGIN:VALARM', 'TRIGGER:-PT9H', 'ACTION:DISPLAY', `DESCRIPTION:${summary}`, 'END:VALARM',
    'END:VEVENT', 'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([ics], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${task.task.replace(/[^\w]+/g, '-').slice(0, 40)}.ics`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`📅 Reminder for ${dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`);
};

/* ─── NOTES + GTK shared wrapper ─── */
function ensureDetailExtrasWrapper() {
  let wrap = $('#detailExtras');
  if (!wrap) {
    wrap = el('div', { id: 'detailExtras', class: 'detail-extras' });
    $('#detailBody').appendChild(wrap);
  }
  return wrap;

/* ─── NOTES ─── */
function renderNotes(stop, stopIdx) {
  const wrap = ensureDetailExtrasWrapper();
  let card = wrap.querySelector('.notes-section');
  if (!card) { card = el('div', { class: 'notes-section' }); wrap.appendChild(card); }
  const key = `notes-${stopIdx}`;
  const saved = lsGet(key) || '';
  card.innerHTML = `
    <div class="notes-head">
      <span class="notes-title">📝 Our Notes</span>
      <span class="notes-hint">saved on this device only</span>

/* ─── GOOD TO KNOW + EMERGENCY + PHRASES ─── */
function findCountryFor(stop) {
  const m = stop.country.replace(/[^A-Za-z ]/g, '').trim();
  return TRIP.countries.find(c => c.name === m) || null;
}
function renderGoodToKnow(stop) {
  const gtk = stop.goodToKnow;
  if (!gtk) return;
  const country = findCountryFor(stop);
  const wrap = ensureDetailExtrasWrapper();
  let card = wrap.querySelector('.gtk-card');
  if (!card) { card = el('div', { class: 'gtk-card' }); wrap.appendChild(card); }
  let emergencyHtml = '';
  if (country?.emergency) {
    const rows = Object.entries(country.emergency).map(([k, v]) =>
      `<div class="emergency-item"><span class="emergency-key">${escapeHtml(k)}</span><span class="emergency-val">${escapeHtml(v)}</span></div>`).join('');
    emergencyHtml = `<details class="gtk-extra">
      <summary><span>🚨 Emergency Numbers</span><span class="gtk-chevron" aria-hidden="true"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 7,9 11,5"/></svg></span></summary>
      <div class="gtk-extra-content"><div class="emergency-list">${rows}</div></div>
    </details>`;
  }
  let phrasesHtml = '';
  if (country?.phrases?.length) {
    const rows = country.phrases.map(p =>
      `<div class="phrase-row"><span class="phrase-en">${escapeHtml(p[0])}</span><span class="phrase-local">${escapeHtml(p[1])}</span></div>`).join('');
    phrasesHtml = `<details class="gtk-extra">
      <summary><span>💬 Travel Phrases (${escapeHtml(country.name)})</span><span class="gtk-chevron" aria-hidden="true"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 7,9 11,5"/></svg></span></summary>
      <div class="gtk-extra-content"><div class="phrases-list">${rows}</div></div>
    </details>`;
  }
  card.innerHTML = `
    <p class="gtk-title">Good to Know</p>
    <div class="gtk-grid">
      <div class="gtk-item"><span class="gtk-emoji">💱</span><div><div class="gtk-key">Currency</div><div class="gtk-val">${escapeHtml(gtk.currency || '—')}</div></div></div>
      <div class="gtk-item"><span class="gtk-emoji">🕐</span><div><div class="gtk-key">Time Zone</div><div class="gtk-val">${escapeHtml(gtk.timezone || '—')}</div></div></div>
      <div class="gtk-item"><span class="gtk-emoji">🔌</span><div><div class="gtk-key">Plug</div><div class="gtk-val">${escapeHtml(gtk.plug || '—')}</div></div></div>
      <div class="gtk-item"><span class="gtk-emoji">🗣️</span><div><div class="gtk-key">Language</div><div class="gtk-val">${escapeHtml(gtk.language || '—')}</div></div></div>
      <div class="gtk-item" style="grid-column: 1 / -1"><span class="gtk-emoji">☔</span><div><div class="gtk-key">Oct Climate</div><div class="gtk-val">${escapeHtml(gtk.climate || '—')}</div></div></div>
    </div>
    ${emergencyHtml}${phrasesHtml}
  `;
}

function emptyState(emoji, text) { return `<div class="empty-state"><div class="empty-state-emoji">${emoji}</div><div>${text}</div></div>`; }
function sectionSummary(label, value) { return `<div class="section-summary"><span class="section-summary-label">${escapeHtml(label)}</span><span class="section-summary-value">${escapeHtml(value)}</span></div>`; }
function tagFromTier(t) { return t === 'l' ? ['Luxury'] : t === 'p' ? ['Preferred'] : t === 'b' ? ['Budget'] : []; }

function itemCard({ emoji, title, price, time, desc, tags, coords, stop, isHotel }) {
  const tagsHtml = (tags || []).map(t => {
    let cls = 'item-tag';
    if (t === 'Luxury') cls += ' tier-l';
    else if (t === 'Preferred') cls += ' tier-p';
    else if (t === 'Budget') cls += ' tier-b';
    return `<span class="${cls}">${escapeHtml(t)}</span>`;
  }).join('');
  const coordAttr = (coords && coords.length === 2) ? `data-lat="${coords[0]}" data-lng="${coords[1]}"` : '';
  const actions = buildActionLinks(title, stop, coords, isHotel);
  return `<div class="item-card" ${coordAttr} tabindex="0" role="button" aria-label="${escapeHtml(title)}" onclick="onItemClick(event, this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();onItemClick(event,this);}">
    <div class="item-head">
      <span class="item-emoji" aria-hidden="true">${emoji || '📍'}</span>
      <span class="item-title">${escapeHtml(title)}</span>
      ${price ? `<span class="item-price">${escapeHtml(price)}</span>` : ''}
    </div>
    ${desc ? `<p class="item-desc">${escapeHtml(desc)}</p>` : ''}
    <div class="item-foot">${tagsHtml}${time ? `<span class="item-time">⏱ ${escapeHtml(time)}</span>` : ''}</div>
    <div class="item-actions">${actions}</div>
  </div>`;
}

function buildActionLinks(name, stop, coords, isHotel) {
  if (!stop) return '';
  const stop_ = stop;
  const links = [];
  links.push(`<a class="action-btn" href="${mapsUrl(name, stop_, coords)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="action-btn-icon">📍</span>Maps</a>`);
  if (isHotel) {
    links.push(`<a class="action-btn" href="${bookingUrl(name, stop_)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="action-btn-icon">🏨</span>Booking</a>`);
    links.push(`<a class="action-btn" href="${compareHotelsUrl(name, stop_)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="action-btn-icon">💰</span>Compare</a>`);
  } else {
    links.push(`<a class="action-btn" href="${getYourGuideUrl(name, stop_)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="action-btn-icon">🎫</span>Tours</a>`);
    links.push(`<a class="action-btn" href="${tripadvisorUrl(name, stop_)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="action-btn-icon">ℹ️</span>Reviews</a>`);
  }
  return links.join('');
}
function parseTransportRoute(label) {
  if (!label) return null;
  // Match "X → Y (...)" or "X → Y"
  const m = String(label).match(/^(.+?)\s*[→]\s*(.+?)(?:\s*[(（].*)?$/);
  if (!m) return null;
  return { from: m[1].trim(), to: m[2].trim() };
}

function buildTransportActions(t) {
  const links = [];
  const route = parseTransportRoute(t.label);
  const icon = String(t.icon || '');

  // 1. Directions on Google Maps (always — for routes that have from/to)
  if (route) {
    const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(route.from)}&destination=${encodeURIComponent(route.to)}&travelmode=${icon.includes('🚗') ? 'driving' : 'transit'}`;
    links.push(`<a class="action-btn" href="${url}" target="_blank" rel="noopener"><span class="action-btn-icon">📍</span>Directions</a>`);
  }

  // 2. Primary Book link (their suggested URL)
  if (t.book) {
    links.push(`<a class="action-btn" href="${escapeHtml(t.book)}" target="_blank" rel="noopener"><span class="action-btn-icon">↗</span>Book</a>`);
  }

  // 3. Compare alternative — type-specific aggregator
  const q = route ? encodeURIComponent(`${route.from} to ${route.to}`) : '';
  if (icon.includes('✈️')) {
    // Flight: Google Flights + Skyscanner
    links.push(`<a class="action-btn" href="https://www.google.com/travel/flights${q ? '?q=' + q : ''}" target="_blank" rel="noopener"><span class="action-btn-icon">✈️</span>Google Flights</a>`);
    links.push(`<a class="action-btn" href="https://www.skyscanner.com/" target="_blank" rel="noopener"><span class="action-btn-icon">🔍</span>Skyscanner</a>`);
  } else if (icon.includes('🚗')) {
    // Car rental
    links.push(`<a class="action-btn" href="https://www.rentalcars.com/" target="_blank" rel="noopener"><span class="action-btn-icon">💰</span>Rentalcars</a>`);
    links.push(`<a class="action-btn" href="https://www.kayak.com/cars" target="_blank" rel="noopener"><span class="action-btn-icon">🔍</span>Kayak Cars</a>`);
  } else if (icon.includes('🚤') || icon.includes('⛵')) {
    // Ferry
    links.push(`<a class="action-btn" href="https://www.directferries.com/" target="_blank" rel="noopener"><span class="action-btn-icon">🚤</span>Direct Ferries</a>`);
  } else {
    // Default: ground transit (train + bus + multi-modal in Europe)
    links.push(`<a class="action-btn" href="https://www.omio.com/" target="_blank" rel="noopener"><span class="action-btn-icon">🔍</span>Omio</a>`);
    links.push(`<a class="action-btn" href="https://www.trainline.com/" target="_blank" rel="noopener"><span class="action-btn-icon">🚄</span>Trainline</a>`);
  }
  return links.join('');
}

function transportCard(t, direction) {
  const actions = buildTransportActions(t);
  return `<div class="transport-card">
    <div class="transport-direction">${direction}</div>
    <div class="transport-head">
      <span class="transport-icon">${t.icon || '🚄'}</span>
      <div class="transport-label">${escapeHtml(t.label || '')}</div>
    </div>
    ${t.detail ? `<p class="transport-detail">${escapeHtml(t.detail)}</p>` : ''}
    <div class="transport-meta">${t.price ? `<span class="transport-meta-item"><span class="transport-meta-key">Price</span> ${escapeHtml(t.price)}</span>` : ''}</div>
    ${t.tip ? `<div class="transport-tip">💡 ${escapeHtml(t.tip)}</div>` : ''}
    ${actions ? `<div class="item-actions" style="margin-top: 12px">${actions}</div>` : ''}
  </div>`;
}
window.onItemClick = function(e, card) {
  if (e && e.target && e.target.closest('.action-btn')) return;
  const lat = parseFloat(card.dataset.lat);
  const lng = parseFloat(card.dataset.lng);
  if (isNaN(lat) || isNaN(lng)) return;
  const itemKey = card.dataset.itemKey;
  const stop = TRIP.stops[currentStopIdx];
  if (!stop || !itemKey) { map.flyTo([lat, lng], 15, { duration: 0.8 }); return; }
  const isHotel = itemKey.startsWith('h-');
  const idx = parseInt(itemKey.split('-')[1], 10);
  const item = isHotel ? (stop.hotels || [])[idx] : (stop.activities || [])[idx];
  if (!item) { map.flyTo([lat, lng], 15, { duration: 0.8 }); return; }
  const targetZoom = isHotel ? 16 : 15;
  const flyZoom = Math.max(map.getZoom(), targetZoom);
  map.flyTo([lat, lng], flyZoom, { duration: 0.7, easeLinearity: 0.4 });
  setTimeout(() => {
    const html = buildPoiPopupHtml(item, stop, isHotel, itemKey);
    L.popup({ maxWidth: 280, minWidth: 280, autoPan: true, autoPanPadding: [40, 40], offset: [0, -12] })
      .setLatLng([lat, lng])
      .setContent(html)
      .openOn(map);
    setTimeout(maybeLoadWikiInPopup, 80);
  }, 250);
};

window.openPoiInPanel = function(stopIdx, itemKey) {
  if (stopIdx !== currentStopIdx) selectStop(stopIdx);
  const isHotel = itemKey.startsWith('h-');
  switchTab(isHotel ? 'hotels' : 'activities');
  setTimeout(() => {
    const card = document.querySelector(`.item-card[data-item-key="${itemKey}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.transition = 'box-shadow 0.3s ease, transform 0.3s ease';
      card.style.boxShadow = `0 0 0 3px ${TRIP.stops[stopIdx].color}aa`;
      card.style.transform = 'scale(1.01)';
      setTimeout(() => { card.style.boxShadow = ''; card.style.transform = ''; }, 1400);
    }
    map.closePopup();
  }, 120);
};

/* ─── TABS / SHARE / KEYBOARD ─── */
function switchTab(name) {
  $$('.tab').forEach(t => t.classList.toggle('is-active', t.dataset.tab === name));
  $$('.tab-pane').forEach(p => p.classList.toggle('is-active', p.dataset.pane === name));
}
function bindTabs() { $$('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab))); }
function bindShare() {
  $('#shareBtn').addEventListener('click', async () => {
    const url = window.location.href;
    const data = { title: TRIP.title, text: `${TRIP.title} · ${TRIP.dates}`, url };
    if (navigator.share) { try { await navigator.share(data); return; } catch (e) {} }
    try { await navigator.clipboard.writeText(url); showToast('Link copied'); } catch (e) { showToast('Copy failed'); }
  });
}
function showToast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('is-visible');
  setTimeout(() => t.classList.remove('is-visible'), 2200);
}
function bindKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape' && $('#detailPanel').classList.contains('is-open')) { e.preventDefault(); closeDetail(); }
    else if (e.key === 'ArrowLeft' && $('#detailPanel').classList.contains('is-open') && currentStopIdx > 0) { e.preventDefault(); selectStop(currentStopIdx - 1); }
    else if (e.key === 'ArrowRight' && $('#detailPanel').classList.contains('is-open') && currentStopIdx < TRIP.stops.length - 1) { e.preventDefault(); selectStop(currentStopIdx + 1); }
    else if (e.key === 't' && !e.metaKey && !e.ctrlKey) { $('#themeToggle').click(); }
    else if (e.key === ' ' && !$('#detailPanel').classList.contains('is-open')) { e.preventDefault(); $('#playBtn').click(); }
  });
}
function bindNavBtns() {
  $('#prevStopBtn').addEventListener('click', () => currentStopIdx > 0 && selectStop(currentStopIdx - 1));
  $('#nextStopBtn').addEventListener('click', () => currentStopIdx < TRIP.stops.length - 1 && selectStop(currentStopIdx + 1));
  $('#detailClose').addEventListener('click', closeDetail);
  $('#playBtn').addEventListener('click', playJourney);
}
function renderLastUpdated() { $('#lastUpdated').textContent = TRIP.lastUpdated ? `Last updated · ${TRIP.lastUpdated}` : ''; }

/* ─── ONBOARDING HINT (first-visit only) ─── */
function dismissHint() {
  const hint = $('#onboardingHint');
  if (hint && !hint.hidden) {
    hint.hidden = true;
    lsSet('hint-dismissed', true);
  }
}
function initOnboardingHint() {
  const hint = $('#onboardingHint');
  if (!hint) return;
  if (!lsGet('hint-dismissed')) hint.hidden = false;
  $('#hintClose').addEventListener('click', dismissHint);
}

function init() {
  initTheme();
  renderHeader();
  renderCover();
  renderStats();
  renderBudget();
  renderBookingCard();
  renderPackingCard();
  renderCountdown();
  setInterval(renderCountdown, 1000 * 60 * 30);
  renderStopsList();
  renderLastUpdated();
  initMap();
  bindTabs();
  bindShare();
  bindNavBtns();
  bindKeyboard();
  initOnboardingHint();
}
init();
</script>
</body>
