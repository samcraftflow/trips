<!DOCTYPE html>
<html lang="zh-TW">
<head>

<meta name="description" content="Europe Honeymoon — Oct 16 – Nov 1, 2026" />
<meta property="og:title" content="Europe Honeymoon" />

<meta name="theme-color" content="#1a1814" media="(prefers-color-scheme: dark)" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<style>
:root, [data-theme="light"] {
  --bg: #f8f6f1;
  --bg-elev: #ffffff;
  --bg-soft: #f0ede5;
  --border: #e6e2d8;
  --border-strong: #d4cfc1;
  --text: #1b1a17;
  --text-mid: #56524a;
  --text-soft: #6f6a5e; /* 4.6:1 on --bg ✓ WCAG AA */
  --accent: #b8543a;
  --accent-soft: rgba(184, 84, 58, 0.08);
  --success: #3a6b2a;
  --warning: #c47a3a;
  --tier-l-bg: #f4e8e0;  --tier-l-text: #8b3a1f;
  --tier-p-bg: #e8f0e4;  --tier-p-text: #3a6b2a;
  --tier-b-bg: #e4ecf4;  --tier-b-text: #2a527d;
  --urgent-bg: #fbf2e8;  --urgent-border: #c47a3a;
  --tip-bg: #fef9ef;     --tip-border: #d4a256;
  --shadow-sm: 0 1px 2px rgba(40, 30, 20, 0.04);
  --shadow-md: 0 6px 20px rgba(40, 30, 20, 0.07);
  --shadow-lg: 0 20px 50px rgba(40, 30, 20, 0.12);
}
[data-theme="dark"] {
  --bg: #1a1814;
  --bg-elev: #25221d;
  --bg-soft: #2f2b25;
  --border: #34302a;
  --border-strong: #4a463e;
  --text: #f0ece4;
  --text-mid: #b8b2a5;
  --text-soft: #7d7669;
  --accent: #d97757;
  --accent-soft: rgba(217, 119, 87, 0.12);
  --success: #7da866;
  --warning: #d4a256;
  --tier-l-bg: #3a2419;  --tier-l-text: #e8a98a;
  --tier-p-bg: #1f2e1c;  --tier-p-text: #a8c98e;
  --tier-b-bg: #1c2735;  --tier-b-text: #88a8c8;
  --urgent-bg: #2e2418;  --urgent-border: #c47a3a;
  --tip-bg: #2a2418;     --tip-border: #d4a256;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 6px 20px rgba(0, 0, 0, 0.35);
  --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
}

:root {
  --radius: 12px;
  --radius-lg: 20px;
  --radius-full: 999px;
  --font-serif: 'Lora', 'Noto Serif TC', 'Songti TC', Georgia, serif;
  --font-sans: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'PingFang TC', sans-serif;
  --sidebar-w: 380px;
  --detail-w: 460px;
  --header-h: 64px;
  /* Button scale tokens (icon/square/circular buttons) — all icons sized to ~50% of container */
  --btn-xs: 20px;  --icon-xs: 12px;  /* checkboxes, micro-chips */
  --btn-sm: 28px;  --icon-sm: 14px;  /* secondary square (checklist-cal, packing-remove) */
  --btn-md: 32px;  --icon-md: 18px;  /* tertiary circular (popup close, carousel nav) */
  --btn-lg: 36px;  --icon-lg: 18px;  /* primary circular (icon-btn, add) */
  --btn-xl: 44px;  --icon-xl: 22px;  /* mobile-promoted */
  /* Pill padding scale */
  --pill-sm: 4px 10px;   /* tags */
  --pill-md: 6px 12px;   /* action-btn, detail-nav-btn, style-btn */
  --pill-lg: 8px 14px;   /* tab, btn */
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.55;
  font-feature-settings: 'kern', 'liga';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.3s ease, color 0.3s ease;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { display: block; max-width: 100%; }

@keyframes shimmer {
  0% { background-position: -200px 0; }
  100% { background-position: 200px 0; }
}
@keyframes marker-pulse {
  0%, 100% { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 0 0 4px rgba(255, 255, 255, 0.6); }
  50%      { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 0 0 14px rgba(255, 255, 255, 0.15); }
}
@keyframes vehicle-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
@keyframes fade-in-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Respect users with vestibular sensitivities (WCAG 2.3.3) */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* Skip link — visually hidden until focused */
.skip-link {
  position: absolute;
  left: -9999px;
  top: 8px;
  z-index: 9999;
  padding: 8px 16px;
  background: var(--text);
  color: var(--bg);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
}
.skip-link:focus { left: 8px; outline: 2px solid var(--accent); outline-offset: 2px; }

/* ────────────────────────────────────────────────────────
   TOP BAR
   ──────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: color-mix(in srgb, var(--bg) 85%, transparent);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.brand-emoji { font-size: 20px; flex-shrink: 0; }
.brand-text {
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.brand-sep { color: var(--text-soft); font-size: 12px; }
.brand-sub {
  color: var(--text-mid);
  font-size: 13px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-elev);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px; /* 50% ratio — was 14px (39%, too small) */
  line-height: 1;
  transition: all 0.15s ease;
  color: var(--text);
}
.icon-btn > span { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
.icon-btn:hover { background: var(--bg-soft); border-color: var(--border-strong); }
.icon-btn.is-playing {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 36px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: var(--bg-elev);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  transition: all 0.15s ease;
}
.btn:hover { background: var(--bg-soft); border-color: var(--border-strong); }

/* ────────────────────────────────────────────────────────
   LAYOUT + SIDEBAR
   ──────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: calc(100vh - var(--header-h));
  position: relative;
}
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--bg);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.cover { position: relative; }
.cover-img {
  position: relative;
  aspect-ratio: 16 / 10;
  background: linear-gradient(135deg, #d4b896, #b8543a);
  overflow: hidden;
}
.cover-img::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
  background-size: 400px 100%;
  animation: shimmer 1.4s infinite linear;
  opacity: 1;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 0;
}
.cover-img.is-loaded::before { opacity: 0; }
.cover-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.4s ease;
  position: relative;
  z-index: 1;
}
.cover-img.is-loaded img { opacity: 1; }
.cover-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 35%, rgba(20, 15, 10, 0.6));
}
.cover-countdown {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 2;
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  padding: 8px 14px;
  background: rgba(255, 255, 255, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-full);
  color: white;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
}
.cover-countdown-num {
  font-family: var(--font-serif);
  font-size: 18px;
  font-weight: 700;
}
.cover-meta {
  position: absolute;
  left: 24px;
  right: 24px;
  bottom: 20px;
  color: white;
  z-index: 1;
}
.cover-badge {
  display: inline-block;
  padding: 4px 10px;
  background: rgba(255, 255, 255, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(8px);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cover-title {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 6px;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
}
.cover-dates {
  font-size: 13px;
  opacity: 0.92;
  letter-spacing: 0.01em;
}

.stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
}
.stat { text-align: center; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-num {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 600;
  line-height: 1.1;
}
.stat-label {
  font-size: 11px;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 4px;
}

.countries-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
}
.country-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px 5px 6px;
  border-radius: var(--radius-full);
  background: var(--bg-soft);
  font-size: 12px;
  font-weight: 500;
}
.country-dot { width: 10px; height: 10px; border-radius: 50%; }

.booking-card {
  margin: 20px 24px 0;
  padding: 14px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  gap: 12px;
}
.booking-circle {
  position: relative;
  width: 44px;
  height: 44px;
  flex-shrink: 0;
}
.booking-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.booking-track { stroke: var(--bg-soft); fill: none; stroke-width: 4; }
.booking-fill { stroke: var(--accent); fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.booking-pct {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-size: 12px;
  font-weight: 700;
}
.booking-body { flex: 1; min-width: 0; }
.booking-title { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.booking-detail { font-size: 11.5px; color: var(--text-soft); }
.booking-detail .urgent { color: var(--tier-l-text); font-weight: 700; } /* 7:1 contrast vs 3:1 */

/* Packing list — collapsible card */
.packing-card {
  margin: 12px 24px 0;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.packing-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s ease;
  border-radius: var(--radius);
}
.packing-head:hover { background: var(--bg-soft); }
.packing-circle { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
.packing-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.packing-track { stroke: var(--bg-soft); fill: none; stroke-width: 4; }
.packing-fill { stroke: var(--success); fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.packing-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 12px; font-weight: 700;
}
.packing-body { flex: 1; min-width: 0; }
.packing-title-row {
  display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
  margin-bottom: 2px;
}
.packing-title { font-size: 12px; font-weight: 600; color: var(--text); }
.packing-chevron {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-mid);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.packing-chevron svg { width: 14px; height: 14px; stroke-width: 2.2; }
.packing-card.is-open .packing-chevron { transform: rotate(180deg); }
.packing-detail { font-size: 11.5px; color: var(--text-soft); }
.packing-detail .left { color: var(--warning); font-weight: 600; }

.packing-body-expanded {
  display: none;
  border-top: 1px solid var(--border);
  padding: 8px 0 12px;
  background: var(--bg);
}
.packing-card.is-open .packing-body-expanded { display: block; }

.packing-category {
  padding: 10px 16px 4px;
}
.packing-category-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-mid);
  margin-bottom: 6px;
}
.packing-items {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.packing-item {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 4px;
  font-size: 12.5px;
  line-height: 1.4;
  border-radius: 6px;
  transition: background 0.12s ease;
  position: relative;
}
.packing-item:hover { background: var(--bg-soft); }
.packing-checkbox {
  flex-shrink: 0;
  width: 24px; height: 24px; /* match checklist-checkbox + WCAG touch target */
  border-radius: 5px;
  border: 1.5px solid var(--border-strong);
  background: var(--bg-elev);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
}
.packing-checkbox.is-checked {
  background: var(--success);
  border-color: var(--success);
}
.packing-checkbox.is-checked::after { content: '✓'; color: white; font-size: 13px; font-weight: 700; }
.packing-label { flex: 1; cursor: pointer; user-select: none; }
.packing-item.is-checked .packing-label { text-decoration: line-through; color: var(--text-soft); }
.packing-remove {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 50%;
  font-size: 16px;
  font-weight: 500;
  color: var(--text-soft);
  display: none;
  align-items: center;
  justify-content: center;
  opacity: 0.7;
  line-height: 1;
}
.packing-item.is-custom .packing-remove { display: inline-flex; }
.packing-remove:hover { background: var(--urgent-bg); color: var(--urgent-border); opacity: 1; }

.packing-add-row {
  display: flex; gap: 6px;
  padding: 6px 4px 8px;
  margin-top: 2px;
}
.packing-add-input {
  flex: 1;
  min-width: 0;
  padding: 7px 10px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  color: var(--text);
  transition: border-color 0.15s ease;
}
.packing-add-input:focus { outline: none; border-color: var(--accent); }
.packing-add-input::placeholder { color: var(--text-soft); }
.packing-add-btn {
  flex-shrink: 0;
  padding: 0;
  width: 36px;
  height: 36px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 20px;
  font-weight: 500;
  line-height: 1;
  color: var(--text-mid);
  transition: all 0.15s ease;
}
.packing-add-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.packing-add-input { height: 36px; }

.budget-card {
  margin: 12px 24px 0;
  padding: 16px 18px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.budget-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed var(--border);
}
.budget-title { font-size: 11px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.08em; text-transform: uppercase; }
.budget-currency { font-size: 10.5px; color: var(--text-soft); }
.budget-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.budget-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--text-mid); }
.budget-row strong { font-weight: 500; color: var(--text); }
.budget-total {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-top: 10px; border-top: 1px solid var(--border);
}
.budget-total-label { font-size: 11px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.08em; text-transform: uppercase; }
.budget-total-amount { font-family: var(--font-serif); font-size: 20px; font-weight: 600; color: var(--accent); }
.budget-foot { margin-top: 8px; font-size: 10.5px; color: var(--text-soft); line-height: 1.5; }

.stops-nav { padding: 20px 24px 16px; }
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.section-head .section-label { margin: 0; }
.onboarding-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px 5px 9px;
  background: var(--accent-soft);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  animation: fade-in-up 0.4s ease;
}
.onboarding-hint[hidden] { display: none; }
.hint-text { line-height: 1.3; }
.hint-close {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px;
  line-height: 1;
  color: var(--accent);
  transition: background 0.15s ease;
}
.hint-close:hover { background: color-mix(in srgb, var(--accent) 20%, transparent); }

.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-soft);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin: 0 0 14px;
}
.stops-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.stop-card {
  display: flex;
  gap: 12px;
  padding: 12px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
}
.stop-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
.stop-card.is-active { border-color: var(--text); box-shadow: var(--shadow-md); }
.stop-card-warn {
  position: absolute;
  top: 10px;
  right: 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px; /* was 2px 7px — too small to read */
  background: var(--warning);
  color: white;
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 700;
  line-height: 1.2;
  display: none;
}
.stop-card-warn.is-shown { display: inline-flex; }
.stop-num {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 14px; font-weight: 600;
  color: white;
}
.stop-body { flex: 1; min-width: 0; }
.stop-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.stop-emoji { font-size: 14px; }
.stop-name {
  font-family: var(--font-serif);
  font-size: 15px; font-weight: 600;
  line-height: 1.25; letter-spacing: -0.01em;
}
.stop-meta { font-size: 12px; color: var(--text-soft); display: flex; gap: 8px; align-items: center; }
.stop-meta-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--text-soft); }
.stop-badge {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 8px;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.03em;
  border-radius: var(--radius-full);
  background: var(--bg-soft);
  color: var(--text-mid);
}
.last-updated {
  padding: 8px 24px 24px;
  font-size: 10.5px;
  color: var(--text-soft);
  text-align: center;
  letter-spacing: 0.04em;
}

/* ────────────────────────────────────────────────────────
   MAP
   ──────────────────────────────────────────────────────── */
.map-wrap { position: relative; background: var(--bg-soft); overflow: hidden; }
#map { width: 100%; height: 100%; }

.leaflet-container { background: var(--bg-soft); font-family: var(--font-sans); }
[data-theme="dark"] .leaflet-container { background: #15130f; }
.leaflet-control-attribution {
  background: color-mix(in srgb, var(--bg-elev) 85%, transparent) !important;
  color: var(--text-mid) !important;
  font-size: 10px !important; padding: 2px 8px !important;
}
.leaflet-control-attribution a { color: var(--accent) !important; }
.leaflet-control-zoom a {
  background: var(--bg-elev) !important; color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: 8px !important;
  width: 32px !important; height: 32px !important; line-height: 32px !important;
  font-size: 16px !important; font-weight: 400 !important;
  margin-bottom: 4px !important;
  box-shadow: var(--shadow-sm) !important;
}
.leaflet-control-zoom { border: none !important; box-shadow: none !important; margin: 16px !important; }

.stop-marker { background: transparent; border: none; }
.stop-marker-inner {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: var(--font-serif); font-weight: 700; font-size: 14px;
  border-radius: 50%;
  border: 3px solid white;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.06);
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
}
[data-theme="dark"] .stop-marker-inner { border-color: #f0ece4; }
.stop-marker:hover .stop-marker-inner { transform: scale(1.15); }
.stop-marker.is-active .stop-marker-inner {
  transform: scale(1.25);
  animation: marker-pulse 1.8s ease-out infinite;
}

.poi-marker { background: transparent; border: none; }
.poi-marker-inner {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-elev);
  border: 2px solid currentColor;
  border-radius: 50%;
  font-size: 12px;
  box-shadow: var(--shadow-sm);
}
.poi-marker.is-hotel .poi-marker-inner { border-radius: 6px; }

/* Leaflet popup override + POI popup */
.leaflet-popup-content-wrapper {
  background: var(--bg-elev) !important;
  color: var(--text) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow-lg) !important;
  padding: 0 !important;
  overflow: hidden;
}
.leaflet-popup-content { margin: 0 !important; width: 280px !important; }
.leaflet-popup-tip { background: var(--bg-elev) !important; border: 1px solid var(--border) !important; }
.leaflet-popup-close-button {
  color: var(--text) !important;
  background: var(--bg-elev) !important;
  border-radius: 50% !important;
  width: 32px !important; height: 32px !important;
  padding: 0 !important;
  top: 10px !important; right: 10px !important;
  font-size: 18px !important; /* was 22 — visually heavier than detail-close (34/20=59%) */
  line-height: 32px !important;
  text-align: center !important;
  border: 1px solid var(--border) !important;
  box-shadow: var(--shadow-md) !important;
  font-weight: 500 !important;
}
.leaflet-popup-close-button:hover { background: var(--bg-soft) !important; transform: scale(1.06); }

/* Carousel inside POI popup */
.poi-popup-carousel {
  position: relative;
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, var(--popup-color, #c0392b) 0%, color-mix(in srgb, var(--popup-color, #c0392b) 55%, #ffffff) 100%);
  overflow: hidden;
}
.poi-popup-carousel-track {
  display: flex;
  height: 100%;
  scroll-snap-type: x mandatory;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.poi-popup-carousel-track::-webkit-scrollbar { display: none; }
.poi-popup-slide {
  position: relative;
  flex: 0 0 100%;
  height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
}
.poi-popup-slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 1;
  transition: opacity 0.4s ease;
}
.poi-popup-slide img.is-fading { opacity: 0; }
.poi-popup-carousel-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.5);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px; /* was 22 — too chunky for thin glyph */
  line-height: 1;
  border: none;
  cursor: pointer;
  z-index: 2;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: all 0.15s ease;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  padding: 0;
}
.poi-popup-carousel-nav:hover { background: rgba(0, 0, 0, 0.7); transform: translateY(-50%) scale(1.06); }
.poi-popup-carousel-nav:disabled { opacity: 0.35; cursor: not-allowed; }
.poi-popup-carousel-nav.prev { left: 8px; }
.poi-popup-carousel-nav.next { right: 8px; }
.poi-popup-carousel-dots {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
  z-index: 2;
  padding: 4px 10px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 999px;
}
.poi-popup-carousel-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.55);
  border: none;
  cursor: pointer;
  padding: 0;
  transition: all 0.25s ease;
}
.poi-popup-carousel-dot.is-active {
  width: 18px;
  border-radius: 3px;
  background: white;
}
.poi-popup-carousel-credit {
  position: absolute;
  top: 8px; left: 8px;
  z-index: 2;
  font-size: 9px;
  color: white;
  background: rgba(0, 0, 0, 0.4);
  padding: 2px 6px;
  border-radius: 6px;
  letter-spacing: 0.03em;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.poi-popup-carousel.has-wiki .poi-popup-carousel-credit { opacity: 0.85; }

.poi-popup-body { padding: 14px 16px 16px; }
.poi-popup-head {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 6px;
}
.poi-popup-emoji { font-size: 18px; line-height: 1.2; }
.poi-popup-name {
  flex: 1;
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 15px;
  line-height: 1.25;
  color: var(--text);
}
.poi-popup-price {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.poi-popup-desc {
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.5;
  margin: 0 0 8px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.poi-popup-meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 10px;
}
.poi-popup-tag {
  display: inline-block;
  padding: 2px 7px;
  background: var(--bg-soft);
  border-radius: var(--radius-full);
  font-size: 10px; color: var(--text-mid); font-weight: 500;
}
.poi-popup-actions {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}

.vehicle-marker { background: transparent; border: none; pointer-events: none; }
.vehicle-icon {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
  animation: vehicle-bob 0.8s ease-in-out infinite;
}

.map-legend {
  position: absolute;
  bottom: 16px; left: 16px;
  z-index: 500;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 11px;
  box-shadow: var(--shadow-md);
  display: flex; flex-direction: column; gap: 4px;
}
.legend-row { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-elev); box-shadow: 0 0 0 1px var(--border-strong); }

.map-controls {
  position: absolute; top: 16px; right: 16px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.map-style-switcher {
  display: flex;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 3px;
  box-shadow: var(--shadow-md);
}
.style-btn {
  padding: 6px 12px;
  font-size: 11px; font-weight: 500;
  border-radius: var(--radius-full);
  color: var(--text-mid);
  transition: all 0.2s ease;
}
.style-btn:hover { color: var(--text); }
.style-btn.is-active { background: var(--text); color: var(--bg-elev); }

.map-reset {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 7px 14px;
  font-size: 12px; font-weight: 500;
  box-shadow: var(--shadow-md);
  display: none; align-items: center; gap: 6px;
  color: var(--text);
}
.map-reset.is-visible { display: inline-flex; }
.map-reset:hover { background: var(--bg-soft); }

.journey-progress {
  position: absolute;
  bottom: 16px;
  right: 16px;
  z-index: 500;
  display: none;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-md);
  font-size: 12px;
  font-weight: 500;
}
.journey-progress.is-visible { display: inline-flex; }
.journey-progress-bar {
  width: 80px;
  height: 4px;
  background: var(--bg-soft);
  border-radius: 999px;
  overflow: hidden;
}
.journey-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
}

/* ────────────────────────────────────────────────────────
   DETAIL PANEL
   ──────────────────────────────────────────────────────── */
.detail-panel {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: var(--detail-w);
  background: var(--bg-elev);
  border-left: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(40, 30, 20, 0.08);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column;
  z-index: 600;
}
.detail-panel.is-open { transform: translateX(0); }

.photo-grid {
  position: relative;
  display: grid;
  grid-template-columns: 2fr 1fr;
  grid-template-rows: 1fr 1fr 1fr;
  gap: 3px;
  aspect-ratio: 3 / 2;
  flex-shrink: 0;
  background: var(--bg-soft);
}
.photo-slot { position: relative; overflow: hidden; background: var(--bg-soft); }
.photo-slot:nth-child(1) { grid-row: 1 / 4; }
.photo-slot img {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.photo-slot img.is-loaded { opacity: 1; }
.photo-slot::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--bg-soft) 0%, var(--border) 50%, var(--bg-soft) 100%);
  background-size: 400px 100%;
  animation: shimmer 1.4s infinite linear;
  transition: opacity 0.3s ease;
}
.photo-slot.is-loaded::before { opacity: 0; pointer-events: none; }
.photo-slot.is-fallback::before {
  background: linear-gradient(135deg, var(--photo-color, #c0392b) 0%, color-mix(in srgb, var(--photo-color, #c0392b) 50%, #ffffff) 100%);
  animation: none; opacity: 1;
}

.detail-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.95);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 20px; color: #1b1a17;
  z-index: 10;
  box-shadow: var(--shadow-md);
  transition: all 0.15s ease;
}
.detail-close:hover { transform: scale(1.06); background: white; }

.detail-head {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.detail-head-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-soft);
  margin-bottom: 6px;
  letter-spacing: 0.04em; text-transform: uppercase;
}
.detail-head-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-serif); font-weight: 700; font-size: 11px;
  color: white;
}
.detail-head-title {
  font-family: var(--font-serif);
  font-size: 26px; font-weight: 600;
  letter-spacing: -0.02em;
  margin: 0 0 4px;
}
.detail-head-dates { font-size: 13px; color: var(--text-mid); }
.detail-nav { display: flex; gap: 8px; margin-top: 12px; }
.detail-nav-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 12px; /* was 4×8 — too small vs siblings (Prev/Next is primary nav) */
  border-radius: 6px;
  background: var(--bg-soft);
  font-size: 12px; font-weight: 500;
  color: var(--text-mid);
  transition: all 0.15s ease;
}
.detail-nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
.detail-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.tabs {
  display: flex;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  position: sticky; top: 0; z-index: 5;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 14px;
  font-size: 12px; font-weight: 500;
  color: var(--text-soft);
  border-bottom: 2px solid transparent;
  white-space: nowrap;
}
.tab:hover { color: var(--text-mid); }
.tab.is-active { color: var(--text); border-bottom-color: var(--text); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.detail-body::-webkit-scrollbar { width: 6px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.tab-pane { display: none; animation: fade-in-up 0.3s ease; }
.tab-pane.is-active { display: block; }

.schedule-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.schedule-item {
  display: flex; gap: 12px;
  padding: 12px;
  background: var(--bg);
  border-radius: var(--radius);
  font-size: 13px; line-height: 1.6;
}
.schedule-bullet {
  flex-shrink: 0;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-top: 8px;
}

.item-card {
  padding: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  transition: all 0.15s ease;
  cursor: pointer;
}
.item-card:hover { border-color: var(--border-strong); background: var(--bg-elev); box-shadow: var(--shadow-sm); }
.item-head { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.item-emoji { font-size: 18px; line-height: 1.2; }
.item-title { flex: 1; font-weight: 600; font-size: 14px; letter-spacing: -0.005em; line-height: 1.3; }
.item-price { font-size: 12px; color: var(--accent); font-weight: 600; white-space: nowrap; }
.item-desc { font-size: 12.5px; color: var(--text-mid); line-height: 1.55; margin: 0 0 8px; }
.item-foot { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.item-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px; /* was 5×10 — too cramped vertically */
  border-radius: var(--radius-full);
  background: var(--bg-soft);
  font-size: 11.5px;
  font-weight: 500;
  color: var(--text-mid);
  transition: all 0.15s ease;
  white-space: nowrap;
  text-decoration: none;
  line-height: 1.2;
}
.action-btn:hover {
  background: var(--accent);
  color: white;
  transform: translateY(-1px);
}
.action-btn-icon { font-size: 12px; }
.item-tag {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-soft);
  border-radius: var(--radius-full);
  font-size: 10.5px; color: var(--text-mid); font-weight: 500;
}
.item-tag.tier-l { background: var(--tier-l-bg); color: var(--tier-l-text); }
.item-tag.tier-p { background: var(--tier-p-bg); color: var(--tier-p-text); }
.item-tag.tier-b { background: var(--tier-b-bg); color: var(--tier-b-text); }
.item-time { font-size: 11px; color: var(--text-soft); }

.section-summary {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-top: 16px;
  padding: 12px 14px;
  background: var(--bg-soft);
  border-radius: var(--radius);
  font-size: 12px;
}
.section-summary-label { font-weight: 600; color: var(--text-mid); letter-spacing: 0.04em; text-transform: uppercase; font-size: 10.5px; }
.section-summary-value { font-family: var(--font-serif); font-weight: 600; font-size: 15px; color: var(--accent); }

/* Checklist with booking tracker */
.checklist-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
.checklist-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: var(--radius);
  font-size: 13px; line-height: 1.45;
  transition: all 0.2s ease;
}
.checklist-item.is-urgent { background: var(--urgent-bg); border-left: 3px solid var(--urgent-border); }
.checklist-item.is-done { opacity: 0.6; }
.checklist-item.is-done .checklist-task { text-decoration: line-through; }
.checklist-checkbox {
  flex-shrink: 0;
  width: 24px; height: 24px; /* WCAG 2.5.5 touch target */
  border-radius: 50%;
  border: 1.5px solid var(--border-strong);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 0;
  transition: all 0.15s ease;
  background: var(--bg-elev);
}
.checklist-checkbox.is-urgent { border-color: var(--urgent-border); background: var(--urgent-bg); }
.checklist-checkbox.is-checked {
  background: var(--success);
  border-color: var(--success);
}
.checklist-checkbox.is-checked::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
.checklist-body { flex: 1; min-width: 0; }
.checklist-task { font-weight: 500; color: var(--text); }
.checklist-note { font-size: 11.5px; color: var(--text-soft); margin-top: 2px; }
.checklist-cal {
  flex-shrink: 0;
  width: 28px; height: 28px; /* align to 4-step button scale (was 26 outlier) */
  border-radius: 6px;
  background: var(--bg-soft);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; /* 50% ratio */
  line-height: 1;
  transition: all 0.15s ease;
  color: var(--text-mid);
}
.checklist-cal:hover { background: var(--accent); color: white; }

/* Transport */
.transport-card { padding: 16px; background: var(--bg); border-radius: var(--radius); margin-bottom: 14px; }
.transport-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.transport-icon {
  font-size: 22px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  display: inline-flex; align-items: center; justify-content: center;
}
.transport-label { font-weight: 600; font-size: 14px; line-height: 1.3; }
.transport-direction { font-size: 10.5px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.transport-detail { font-size: 12.5px; color: var(--text-mid); line-height: 1.55; margin-bottom: 8px; }
.transport-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; }
.transport-meta-item { display: inline-flex; align-items: center; gap: 4px; color: var(--text-mid); }
.transport-meta-key { color: var(--text-soft); }
.transport-tip {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--tip-bg);
  border-left: 3px solid var(--tip-border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.55;
}
.transport-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 12px; color: var(--accent); font-weight: 500; }
.transport-link:hover { text-decoration: underline; }

/* Detail extras wrapper — divider + label separating stop-level info from tab content */
.detail-extras {
  margin-top: 36px;
  padding-top: 28px;
  position: relative;
  border-top: 1px dashed var(--border-strong);
}
.detail-extras::before {
  content: 'About this stop';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-elev);
  padding: 0 14px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-soft);
}

/* Notes section */
.notes-section {
  margin-top: 0;
  padding: 18px 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.notes-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px;
}
.notes-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft); }
.notes-hint { font-size: 10px; color: var(--text-soft); font-weight: 400; text-transform: none; letter-spacing: 0; }
.notes-textarea {
  width: 100%;
  min-height: 88px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-elev);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  resize: vertical;
  transition: border-color 0.15s ease;
}
.notes-textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-color: var(--accent); }
.notes-textarea:focus { border-color: var(--accent); }
/* Visible focus for all interactive elements */
.icon-btn:focus-visible, .btn:focus-visible, .action-btn:focus-visible,
.tab:focus-visible, .style-btn:focus-visible, .stop-card:focus-visible,
.item-card:focus-visible, .checklist-checkbox:focus-visible,
.checklist-cal:focus-visible, .detail-nav-btn:focus-visible,
.detail-close:focus-visible, .map-reset:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.notes-textarea::placeholder { color: var(--text-soft); }
.notes-status {
  font-size: 10.5px;
  color: var(--text-soft);
  margin-top: 6px;
  text-align: right;
  letter-spacing: 0.04em;
}

/* Good to know */
.gtk-card {
  margin-top: 16px;
  padding: 18px 20px 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.gtk-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 14px; }
.gtk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
.gtk-item { display: flex; gap: 10px; align-items: flex-start; }
.gtk-emoji { font-size: 18px; flex-shrink: 0; line-height: 1.2; }
.gtk-key { font-size: 10.5px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1px; }
.gtk-val { font-size: 12.5px; font-weight: 500; line-height: 1.4; }

.gtk-extra {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.gtk-extra summary {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-soft);
  cursor: pointer;
  padding: 6px 0;
  list-style: none;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.gtk-extra summary::-webkit-details-marker { display: none; }
.gtk-chevron {
  width: 24px; height: 24px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-mid);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.gtk-chevron svg { width: 14px; height: 14px; stroke-width: 2.2; }
.gtk-extra[open] .gtk-chevron { transform: rotate(180deg); }
.gtk-extra-content { padding-top: 10px; }
.emergency-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; }
.emergency-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.emergency-item:last-child { border-bottom: none; }
.emergency-key { color: var(--text-soft); }
.emergency-val { font-weight: 600; font-family: var(--font-mono, ui-monospace), monospace; }
.phrases-list { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; }
.phrase-row { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.phrase-row:last-child { border-bottom: none; }
.phrase-en { color: var(--text-soft); flex-shrink: 0; }
.phrase-local { font-weight: 500; text-align: right; }

.empty-state {
  text-align: center;
  padding: 32px 24px;
  color: var(--text-soft);
  font-size: 13px;
  line-height: 1.6;
}
.empty-state-emoji { font-size: 28px; margin-bottom: 8px; opacity: 0.6; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 18px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 2000;
}
.toast.is-visible { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Mobile */
@media (max-width: 1024px) {
  :root { --sidebar-w: 320px; --detail-w: 400px; }
}
@media (max-width: 768px) {
  :root { --header-h: 56px; }
  .layout { grid-template-columns: 1fr; grid-template-rows: 50vh 1fr; }
  .sidebar { grid-row: 2; border-right: none; border-top: 1px solid var(--border); max-height: 50vh; }
  .map-wrap { grid-row: 1; }
  .topbar { padding: 0 12px; gap: 6px; }
  .brand { gap: 8px; min-width: 0; flex: 1; }
  .brand-text { font-size: 15px; }
  .brand-sep, .brand-sub { display: none; }
  /* Share button: icon-only on mobile (native share is essential here) */
  .btn { padding: 0; width: 36px; height: 36px; border-radius: 50%; justify-content: center; gap: 0; }
  .btn span:not([aria-hidden]) { display: none; }
  .btn span[aria-hidden] { font-size: 16px; }
  .icon-btn { font-size: 18px; }
  /* Detail panel slides up from bottom on mobile */
  .detail-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); transform: translateY(100%); }
  .detail-panel.is-open { transform: translateY(0); }
  .cover-img { aspect-ratio: 16 / 9; }
  .cover-title { font-size: 24px; }
  .stat-num { font-size: 18px; }
  .map-legend { font-size: 10px; padding: 8px 10px; }
  /* Touch target sizes — WCAG 2.5.5 + Apple HIG */
  .map-style-switcher { padding: 3px; }
  .style-btn { padding: 8px 12px; font-size: 11px; min-height: 28px; }
  .map-reset { padding: 9px 14px; min-height: 32px; }
  .icon-btn { width: 40px; height: 40px; }
  .checklist-cal { width: 32px; height: 32px; }
  .action-btn { padding: 7px 12px; font-size: 12px; min-height: 32px; }
  .detail-nav-btn { padding: 7px 12px; min-height: 32px; font-size: 12px; }
}
</style>
</head>

function stopCity(stop) {
  return stop.name.replace(/Hub|hub/g, '').trim();
}
function stopCountryEn(stop) {
  return (stop.country || '').replace(/[^A-Za-z ]/g, '').trim();
}
function mapsUrl(name, stop, coords) {
  if (coords && coords.length === 2) {
    // Query with name biases Google to the right place + shows reviews
    return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + stopCity(stop))}&query_place_id=&center=${coords[0]},${coords[1]}`;
  }
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + stopCity(stop))}`;
}

/* ─── WIKIPEDIA LAZY FETCH (no key, with localStorage cache) ─── */
const WIKI_MEDIA_KEY = 'wiki-media-cache-v2';
let wikiMediaCache = {};
try { wikiMediaCache = JSON.parse(localStorage.getItem(WIKI_MEDIA_KEY) || '{}'); } catch (e) {}
function _saveWikiCache() { try { localStorage.setItem(WIKI_MEDIA_KEY, JSON.stringify(wikiMediaCache)); } catch (e) {} }

// Fetch up to 5 image URLs from a Wikipedia article's media list
async function fetchWikiMediaList(title) {
  const key = title.toLowerCase().trim();
  if (key in wikiMediaCache) return wikiMediaCache[key];
  try {
    const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/media-list/${encodeURIComponent(title)}`);
    if (!r.ok) { wikiMediaCache[key] = []; _saveWikiCache(); return []; }
    const data = await r.json();
    const urls = (data.items || [])
      .filter(it => it.type === 'image' && it.srcset && it.srcset.length && !/\.(svg|ogv|webm|gif|tiff?)/i.test(it.title || ''))
      .slice(0, 6)
      .map(it => {
        // Use the LARGEST entry Wikipedia actually generated (don't guess sizes — they 400)
        const largest = it.srcset[it.srcset.length - 1];
        let src = largest.src;
        if (!src.startsWith('http')) src = 'https:' + src;
        return src;
      });
    wikiMediaCache[key] = urls;
    _saveWikiCache();
    return urls;
  } catch (e) { wikiMediaCache[key] = []; _saveWikiCache(); return []; }
}

// Backward-compat single-thumb (used by detail panel hero) — picks first from media list
async function fetchWikiThumb(title) {
  const list = await fetchWikiMediaList(title);
  return list[0] || null;
}
function el(tag, attrs = {}, ...children) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') n.className = v;
    else if (k === 'html') n.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2).toLowerCase(), v);
    else n.setAttribute(k, v);
  }
  for (const c of children.flat()) { if (c == null) continue; n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); }
  return n;
}

function lsGet(k, fb = null) { try { const v = localStorage.getItem(STORAGE_PREFIX + k); return v == null ? fb : JSON.parse(v); } catch (e) { return fb; } }
function lsSet(k, v) { try { localStorage.setItem(STORAGE_PREFIX + k, JSON.stringify(v)); } catch (e) {} }

function applyTheme(t) {

}

/* ─── BUDGET PARSING ─── */
function parsePrice(s) {
  if (!s) return null;
  const txt = String(s);
  if (/免費|free|included|已含/i.test(txt)) return 0;
  const nums = txt.match(/[\d,]+(?:\.\d+)?/g);
  if (!nums) return null;
  const p = nums.map(n => parseFloat(n.replace(/,/g, '')));
  return p.length === 1 ? p[0] : (p[0] + p[1]) / 2;
}
function nightsForStop(s) {
  const m = String(s.day || '').match(/(\d+)\s*[-–]\s*(\d+)/);
  return m ? Math.max(1, parseInt(m[2]) - parseInt(m[1]) + 1) : 1;
}
function fmt(n) { return n.toLocaleString('en-US'); }
function computeBudget() {
  let a = 0, h = 0, t = 0;
  TRIP.stops.forEach(stop => {
    (stop.activities || []).forEach(x => { const p = parsePrice(x.budget); if (p) a += p * (TRIP.travelers || 1); });
    const prices = (stop.hotels || []).map(x => parsePrice(x.price)).filter(p => p);
    if (prices.length) { prices.sort((x, y) => x - y); h += prices[Math.floor(prices.length / 2)] * nightsForStop(stop); }
    [stop.transportIn, stop.transportOut].forEach(x => {
      if (!x) return;
      const p = parsePrice(x.price);
      if (p) t += p * (/per|pax|人/.test(String(x.price)) ? (TRIP.travelers || 1) : 1);
    });
  });
  const f = TRIP.flights?.amount ? Number(TRIP.flights.amount) : 0;
  return { activities: Math.round(a), hotels: Math.round(h), transport: Math.round(t), flights: f, grand: Math.round(a + h + t + f) };
}

/* ─── COUNTDOWN ─── */
function renderCountdown() {
  const target = new Date(TRIP.countdownTarget).getTime();
  const diff = target - Date.now();
  const num = $('#countdown .cover-countdown-num');
  const label = $('#countdown span:last-child');
  if (diff <= 0) {
    const tripEnd = TRIP.tripEndDate ? new Date(TRIP.tripEndDate).getTime() : (target + 1000*60*60*24*30);
    if (Date.now() < tripEnd) { num.textContent = '✨'; label.textContent = 'on the trip'; }
    else { num.textContent = '🎉'; label.textContent = 'memories made'; }
    return;
  }
  const days = Math.floor(diff / (1000*60*60*24));
  num.textContent = days;
  label.textContent = days === 1 ? 'day until' : 'days until';
}
